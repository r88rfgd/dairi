
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Optimized Music Archive</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e1e">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="fuse.js"></script>
    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --accent: #007acc; --text: #d4d4d4; --badge: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .sidebar { width: 340px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .controls { padding: 15px; border-bottom: 1px solid #444; background: #2d2d30; }
        .controls h2 { margin: 0 0 10px; font-size: 18px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        
        .status-dot { width: 10px; height: 10px; background: #28a745; border-radius: 50%; display: inline-block; }
        .status-dot.offline { background: #dc3545; }

        .book-library { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #444; }
        .book-library h3 { font-size: 14px; margin: 0 0 5px; color: #aaa; text-transform: uppercase; }
        .book-item { display: block; padding: 5px 10px; background: #3c3c3c; margin-bottom: 4px; border-radius: 4px; cursor: pointer; color: white; text-decoration: none; font-size: 13px; }
        .book-item:hover { background: #444; }

        .btn { width: 100%; padding: 8px; margin-bottom: 8px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white; }
        .btn-lang { background: #e09129; }
        
        input[type="text"] { width: 95%; padding: 8px; margin-bottom: 10px; background: #3c3c3c; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
        .filter-group select { width: 100%; padding: 6px; margin-bottom: 8px; background: #3c3c3c; border: 1px solid #555; color: white; border-radius: 4px; }

        .list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .card { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; transition: 0.2s; position: relative; }
        .card:hover { background: #3e3e42; }
        .card.active { background: #37373d; border-left: 4px solid var(--accent); }
        
        .card h4 { margin: 0 0 5px; font-size: 16px; color: #fff; }
        .card small { display: block; color: #aaa; margin-top: 4px; font-size: 12px; }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--badge); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; text-transform: uppercase; font-weight: bold; }

        .viewer { flex: 1; display: flex; flex-direction: column; background: #111; }
        .toolbar { padding: 15px 20px; background: #333; border-bottom: 1px solid #444; }
        
        /* iPad optimized scrolling container */
        .content-area { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px; 
        }
        
        /* Auto expanding images replacing PDF view */
        img.page-view { 
            width: 100%; 
            max-width: 900px; 
            height: auto; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.8); 
            border-radius: 4px; 
            background: white; 
            display: block;
        }
        
        @media all and (display-mode: standalone) {
            .controls h2::after { content: " (App Mode)"; font-size: 12px; color: #aaa; }
        }
    </style>
</head>

        </div>
        <div class="list" id="list-container"></div>

        const bookFiles = ["main_dayari.pdf"];
        let lang = 'hinglish'; 

        const fuseOptions = {
            keys: [
                'raag.hinglish', 'raag.hindi', 
                'starting_bol.hinglish', 'starting_bol.hindi',
                'taal.hinglish', 'taal.hindi'
            ],
            threshold: 0.4,
            ignoreLocation: true
        };
        const fuse = new Fuse(data, fuseOptions);

        const bookContainer = document.getElementById('book-list-div');
        // Sort books alphabetically 
        bookFiles.sort().forEach(f => {
            const div = document.createElement('div');
            div.className = 'book-item';
            div.innerText = "📚 " + f.replace('.pdf', '');
            div.onclick = () => loadFullBook(f);
            bookContainer.appendChild(div);
        });

        function toggleLang() {
            lang = (lang === 'hinglish') ? 'hindi' : 'hinglish';
            populateFilters(); 
            filterList();      
        }

        function populateFilters() {
            const sels = { 'raag': document.getElementById('f-raag'), 
                            'taal': document.getElementById('f-taal'), 
                            'type': document.getElementById('f-type') };
            
            const getUnique = (key) => ['All', ...new Set(data.map(i => i[key][lang]))].sort();

            ['raag', 'taal', 'type'].forEach(k => {
                sels[k].innerHTML = ''; 
                getUnique(k).forEach(opt => {
                    sels[k].add(new Option(opt, opt));
                });
                sels[k].value = 'All'; 
            });
        }

        function filterList() {
            const sRaag = document.getElementById('f-raag').value;
            const sTaal = document.getElementById('f-taal').value;
            const sType = document.getElementById('f-type').value;
            const sText = document.getElementById('search-box').value;
            const listEl = document.getElementById('list-container');

            listEl.innerHTML = '';

            let candidates = data;
            if (sText.length > 0) {
                candidates = fuse.search(sText).map(result => result.item);
            }

            const filtered = candidates.filter(item => {
                const matchRaag = (sRaag === 'All' || item.raag[lang] === sRaag);
                const matchTaal = (sTaal === 'All' || item.taal[lang] === sTaal);
                const matchType = (sType === 'All' || item.type[lang] === sType);
                return matchRaag && matchTaal && matchType;
            });

            if (filtered.length === 0) {
                listEl.innerHTML = '<div style="padding:20px; color:#777; text-align:center">No matches found</div>';
                return;
            }

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                    loadItem(item);
                };
                div.innerHTML = `
                    <h4>${item.starting_bol[lang]}</h4>
                    <span class="badge">${item.type[lang]}</span>
                    <small>${item.raag[lang]} | ${item.taal[lang]}</small>
                    <small>Pg: ${item.page} | ${item.file_name.replace('.pdf', '')}</small>
                `;
                listEl.appendChild(div);
            });
        }

        // Loads a single composition image
        function loadItem(item) {
            document.getElementById('header-title').innerText = `${item.starting_bol[lang]} (${item.raag[lang]})`;
            const contentArea = document.getElementById('image-scroll-container');
            
            contentArea.innerHTML = `<img class="page-view" src="${item.image_path}">`;
            contentArea.scrollTop = 0;
        }

        // Gathers all images from a specific book and stacks them for scrolling
        function loadFullBook(filename) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            
            const cleanName = filename.replace('.pdf', '');
            document.getElementById('header-title').innerText = "Viewing Book: " + cleanName;
            
            // Filter all items belonging to this book and sort by page number
            const pages = data.filter(d => d.file_name === filename)
                              .sort((a, b) => (a.page || 0) - (b.page || 0));
            
            // Deduplicate in case multiple compositions exist on the same page
            const uniqueImages = [...new Set(pages.map(p => p.image_path))];

            const contentArea = document.getElementById('image-scroll-container');
            contentArea.innerHTML = ''; // clear current view
            
            if(uniqueImages.length === 0) {
                contentArea.innerHTML = '<div style="color:#777; margin-top:20px;">No images available for this book.</div>';
                return;
            }

            // Append all images in order
            uniqueImages.forEach(imgSrc => {
                const img = document.createElement('img');
                img.className = 'page-view';
                img.src = imgSrc;
                // CRITICAL for iPad: Lazy loading prevents memory crashing when scrolling many large images
                img.loading = "lazy"; 
                contentArea.appendChild(img);
            });
            
            contentArea.scrollTop = 0;
        }

        populateFilters();
        filterList();
    </script>
</body>
</html>
